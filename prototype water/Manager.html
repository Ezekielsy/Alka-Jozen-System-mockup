<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

linear-gradient(
135deg,
#0f4c75,
#3282b8,
#bbe1fa,
#3282b8,
#0f4c75
);
background-size:400% 400%;
animation:waterFlow 20s ease infinite;
color:white;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

@keyframes waterFlow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* MOBILE MENU */

.menu-btn{
display:none;
position:fixed;
top:15px;
left:15px;
z-index:99999;
padding:12px 16px;
border:none;
border-radius:12px;
background:#0f4c75;
color:white;
font-size:22px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
width:260px;
height:100vh;
background:rgba(15,76,117,0.92);
backdrop-filter:blur(20px);
padding:20px;
position:fixed;
border-right:1px solid rgba(255,255,255,0.15);
transition:.3s;
z-index:9999;
overflow-y:auto;
}

.brand{
font-size:26px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
color:#bbe1fa;
}

.sidebar button{
width:100%;
padding:16px;
margin:10px 0;
border:none;
border-radius:16px;
background:rgba(255,255,255,0.08);
color:white;
cursor:pointer;
font-size:15px;
transition:.3s;
text-align:left;
}

.sidebar button:hover{
background:rgba(255,255,255,0.18);
transform:translateX(5px);
}

/* MAIN */

.main{
margin-left:260px;
padding:30px;
width:100%;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.topbar h1{
font-size:32px;
color:#bbe1fa;
}

.clock{
padding:14px 20px;
background:rgba(255,255,255,0.08);
border-radius:16px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
padding:25px;
border-radius:24px;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
margin-bottom:20px;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.stat{
text-align:center;
}

.stat h2{
font-size:40px;
color:#bbe1fa;
}

.stat p{
margin-top:10px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:16px;
text-align:left;
}

th{
background:rgba(15,76,117,0.5);
color:#bbe1fa;
}

tr{
background:rgba(255,255,255,0.05);
}

tr:hover{
background:rgba(255,255,255,0.1);
}

/* BUTTONS */

.btn{
padding:14px 20px;
border:none;
border-radius:16px;
color:white;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

.blue{
background:#3b82f6;
}

.green{
background:#22c55e;
}

.orange{
background:#f97316;
}

/* STATUS */

.status{
padding:8px 14px;
border-radius:20px;
font-size:12px;
font-weight:bold;
display:inline-block;
}

.pending{
background:#f59e0b;
}

.delivered{
background:#22c55e;
}

.prepare{
background:#3b82f6;
}

/* NOTIFY */

.notify{
padding:16px;
border-radius:14px;
background:rgba(255,255,255,0.08);
margin:10px 0;
}

/* INPUT */

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:16px;
outline:none;
}

/* POPUP */

.popup-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
backdrop-filter:blur(8px);
}

.popup-card{
width:400px;
padding:35px;
border-radius:24px;
background:rgba(187,225,250,0.12);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.2);
text-align:center;
animation:popupShow .4s ease;
}

@keyframes popupShow{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}

/* RESPONSIVE */

@media(max-width:768px){

.menu-btn{
display:block;
}

.sidebar{
left:-100%;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
padding-top:80px;
}

.topbar{
flex-direction:column;
gap:15px;
align-items:flex-start;
}

.popup-card{
width:90%;

/* FILTER HEALTH BAR */
.bar-container{

border-radius:20px;

.bar-fill{
height:100%;

}

.bar-text{

  function openReportForm(){
document.getElementById("reportPopup").style.display = "flex";
}

function closeReportForm(){
document.getElementById("reportPopup").style.display = "none";
}

function saveReport(){

let refilled = parseFloat(document.getElementById("repRefilled").value);
let sold = parseFloat(document.getElementById("repSold").value);
let unsold = parseFloat(document.getElementById("repUnsold").value);
let reason = document.getElementById("repReason").value;

if(isNaN(refilled) || isNaN(sold) || isNaN(unsold) || reason.trim() === ""){
alert("Please complete all fields");
return;
}

let report = {
date: new Date().toLocaleString(),
refilled,
sold,
unsold,
reason
};

reportsList.push(report);

localStorage.setItem("reportsList", JSON.stringify(reportsList));

closeReportForm();
reports();
}

  function showAttendanceCalendar(riderId, year = 2026, month = 4){
  const attendance = getAttendance();
  const data = attendance[riderId] || {};

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();

  let html = `
    <div class="card">
      <h2>📅 Attendance Calendar</h2>
      <p class="sub">Rider: ${riderId}</p>

      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:15px;">
        <b>Sun</b><b>Mon</b><b>Tue</b><b>Wed</b><b>Thu</b><b>Fri</b><b>Sat</b>
      </div>

      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px;">
  `;

  // blank spaces before 1st day
  for(let i=0;i<firstDay;i++){
    html += `<div></div>`;
  }

  for(let day=1; day<=daysInMonth; day++){

    let dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    let record = data[dateKey];

    let color = "#e5e7eb"; // default gray
    let text = day;

    if(record){
      if(record.status === "On-time") color = "#22c55e";
      else if(record.status === "Late") color = "#f59e0b";
      else if(record.status === "Pending") color = "#3b82f6";
      else if(record.status === "Absent") color = "#ef4444";

      text = `${day}<br><small>${record.loginTime}</small>`;
    }

    html += `
      <div style="
        background:${color};
        color:white;
        padding:10px;
        border-radius:12px;
        text-align:center;
        font-size:12px;
      ">
        ${text}
      </div>
    `;
  }

  html += `
      </div>
    </div>
  `;

  document.getElementById("content").innerHTML = html;
}

  function approveAttendance(riderId, dateKey){

  let attendance = getAttendance();

  if(attendance[riderId] && attendance[riderId][dateKey]){

    attendance[riderId][dateKey].status = "On-time";

    saveAttendance(attendance);

    notify("✅ Attendance Approved");
  }
}

function markAttendance(riderId){

  let attendance = getAttendance();

  let today = new Date();

  let dateKey = today.toISOString().split("T")[0];

  let time = today.toLocaleTimeString();

  if(!attendance[riderId]){
    attendance[riderId] = {};
  }

  attendance[riderId][dateKey] = {

    loginTime: time,

    status: "Pending"

  };

  saveAttendance(attendance);

  // ✅ AUTO NOTIFICATION TO MANAGER

  notifications.push(
    `📌 ${riderId} submitted attendance at ${time}`
  );

  localStorage.setItem(
    "managerNotifications",
    JSON.stringify(notifications)
  );

}

  function generateCalendar(riderId, year, month){
  const attendance = getAttendance();
  const data = attendance[riderId] || {};

  let html = `<div class="card"><h2>📅 Attendance Calendar</h2>`;

  const daysInMonth = new Date(year, month + 1, 0).getDate();

  for(let day = 1; day <= daysInMonth; day++){
    let dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

    let record = data[dateKey];

    let status = "Absent";
    let time = "-";

    if(record){
      status = record.status;
      time = record.loginTime;
    }

    html += `
      <div class="card">
        <b>${dateKey}</b><br>
        🕒 ${time}<br>
        📌 ${status}
      </div>
    `;
  }

  html += `</div>`;

  document.getElementById("content").innerHTML = html;
}

function openRider(rider){

  const orders = JSON.parse(localStorage.getItem("history")) || [];

  const riderOrders = orders.filter(o => o.rider === rider.name);

  const delivered = riderOrders.filter(o => o.status === "Delivered").length;

  const pending = riderOrders.length - delivered;

  document.getElementById("content").innerHTML = `

    <div class="card">
      <h2>👤 ${rider.name} Performance</h2>

      <div class="grid">

        <div class="card stat">
          <h2>${riderOrders.length}</h2>
          <p>Total Orders</p>
        </div>

        <div class="card stat">
          <h2>${delivered}</h2>
          <p>Delivered</p>
        </div>

        <div class="card stat">
          <h2>${pending}</h2>
          <p>Pending</p>
        </div>

      </div>

      <br>

      <h3>📦 Customer Orders</h3>

      <table>
        <tr>
          <th>Customer</th>
          <th>Address</th>
          <th>Status</th>
          <th>Total</th>
        </tr>

        ${riderOrders.map(o=>`
          <tr>
            <td>${o.name}</td>
            <td>${o.address}</td>
            <td>${o.status}</td>
            <td>₱${o.total}</td>

function changeMonth(step, riderName){

  currentMonth += step;

  if(currentMonth > 11){
    currentMonth = 0;
    currentYear++;
  }

  if(currentMonth < 0){
    currentMonth = 11;
    currentYear--;

<select id="analyticsFilter" onchange="renderAnalytics()"
style="
padding:12px;
border:none;
border-radius:12px;
margin-bottom:20px;
font-size:16px;
">

<option value="today">Today</option>
<option value="week">Weekly</option>
<option value="month">Monthly</option>

</select>

<canvas id="salesChart" height="120"></canvas>

</div>

<!-- ATTENDANCE -->

<div class="card">

<h3>📅 Attendance Information</h3>

<br>

<table>

<tr>
<th>Date</th>
<th>Log In</th>
<th>Status</th>
</tr>

<tr>

<td>
${localStorage.getItem("managerLoginDate") || "-"}
</td>

<td>
${localStorage.getItem("managerLoginTime") || "-"}
</td>

<td>

<span class="status pending">
${localStorage.getItem("managerAttendanceStatus") || "-"}
</span>

</td>

</tr>

</table>

</div>

`;

renderAnalytics();

}

/* INVENTORY */

function inventory(){

document.getElementById("content").innerHTML = `

<div class="grid">

<div class="card stat">
<h2>${gallons}</h2>
<p>Total Gallons Refilled</p>
</div>

<div class="card stat">

<h3>Filter Health</h3>

<div class="bar-container">
  <div class="bar-fill" style="width:${getFilterPercent()}%"></div>
</div>

<div class="bar-text">
${filterLife.toFixed(2)}% remaining
</div>

</div>

<div class="card stat">
<h2>${totalGallonsSold}</h2>
<p>Total Gallons Sold</p>
</div>

</div>


<!-- DAILY INPUT -->
<div class="card">

<h2>📦 Daily Sales Input</h2>

<br>

<p>Enter gallons refilled today:</p>

<input type="number" id="gallonInput" placeholder="e.g. 100">

<br><br>

<button class="btn blue" onclick="addSoldGallons()">
➕ Submit
</button>

<br><br>

<div class="notify">
💧 Every gallon reduces filter life by 0.005%
</div>

<br>

${
filterLife <= 10
?
`<div class="notify" style="background:rgba(255,0,0,0.2);">
⚠ CRITICAL: Replace filter immediately
</div>`
:
filterLife <= 30
?
`<div class="notify" style="background:rgba(255,165,0,0.2);">
⚠ WARNING: Filter is degrading
</div>`
:
`<div class="notify">
✅ Filter condition is good
</div>`
}

</div>


<!-- HISTORY -->
<div class="card">

<h2>📊 Sales History</h2>

<br>

<table>

<tr>
<th>Date</th>
<th>Gallons Sold</th>
<th>Impact</th>
</tr>

${inventoryLogs.length === 0
?
`<tr><td colspan="3">No records yet</td></tr>`
:
inventoryLogs.map(log=>`
<tr>
<td>${log.date}</td>
<td>${log.sold}</td>
<td>-${(log.sold * 0.005).toFixed(2)}%</td>
</tr>
`).join("")
}

</table>

</div>

`;
}

/* ADD GALLONS */

function addSoldGallons(){

let input = document.getElementById("gallonInput").value;
let sold = parseFloat(input);

if(isNaN(sold) || sold <= 0){
alert("Invalid input");
return;
}

/* TOTAL GALLONS */
gallons += sold;

/* TOTAL SOLD */
totalGallonsSold += sold;

/* FILTER DAMAGE */
filterLife -= sold * 0.005;

if(filterLife < 0){
filterLife = 0;
}

/* SAVE HISTORY */
inventoryLogs.push({

date: new Date().toLocaleDateString(),

fullDate: new Date().toLocaleString(),

sold: sold,

refill: sold

});

/* SAVE LOCAL STORAGE */
localStorage.setItem("gallons", gallons);
localStorage.setItem("totalGallonsSold", totalGallonsSold);
localStorage.setItem("filterLife", filterLife);
localStorage.setItem("inventoryLogs", JSON.stringify(inventoryLogs));

/* FILTER WARNING */
if(filterLife <= 10){
notifications.push("⚠ Filter replacement needed");
}

document.getElementById("gallonInput").value = "";

inventory();

}

/* RIDER MONITORING */

function riderMonitoring(){

document.getElementById("content").innerHTML = `

<div class="card">

<h2>🚚 Rider Monitoring</h2>

<br>

<table>

<tr>
<th>Rider</th>
<th>Status</th>
</tr>

${riders.map(r=>`

<tr>

<td>${r.name}</td>

<td>

<span class="status
${r.status=="Delivered"
? "delivered"
: r.status=="Preparing"
? "prepare"
: "pending"}">

${r.status}

</span>

</td>

</tr>

`).join("")}

</table>

</div>

`;

}


/* NOTIFICATIONS */

function showNotifications(){

document.getElementById("content").innerHTML = `

<div class="card">
<h2>🔔 Rider Attendance Requests</h2>
<br>

${notifications.length === 0 ? `
  <div class="notify">No notifications</div>
` : notifications.map(n=>`

<div class="notify">

<b>${n.riderName}</b><br>
📅 ${n.date}<br>
⏰ ${n.time}<br>
📌 Status: <b>${n.status}</b>

<br><br>

${n.status === "Pending" ? `
<button class="btn green" onclick="approveRider('${n.id}')">
Approve
</button>

<button class="btn orange" onclick="rejectRider('${n.id}')">
Reject
</button>
` : `
<span class="status ${n.status === 'Approved' ? 'delivered' : 'pending'}">
${n.status}
</span>
`}

</div>

`).join("")}

</div>

`;
}

function approveRider(id){

let notif = notifications.find(n => n.id === id);

if(!notif) return;

// update attendance sa rider
let attendance = getAttendance();

if(!attendance[notif.riderId]) attendance[notif.riderId] = {};

attendance[notif.riderId][notif.date] = {
  loginTime: notif.time,
  status: "On-time"
};

saveAttendance(attendance);

// update notif
notif.status = "Approved";

localStorage.setItem("notifications", JSON.stringify(notifications));

showNotifications();
}

function rejectRider(id){

let notif = notifications.find(n => n.id === id);

if(!notif) return;

notif.status = "Rejected";

localStorage.setItem("notifications", JSON.stringify(notifications));

showNotifications();
}


function approveNotif(index){

notifications[index] += " ✔ Approved";

localStorage.setItem(
"managerNotifications",
JSON.stringify(notifications)
);

showNotifications();

}

/* REPORTS */

function reports(){

document.getElementById("content").innerHTML = `

<div class="card">

<h2>📋 Reports</h2>

<br>

<button class="btn blue" onclick="openReportForm()">
➕ Create Report
</button>

<br><br>

<h3>📄 Generated Reports</h3>

${
reportsList.length === 0
?
`<div class="notify">No reports yet</div>`
:
reportsList.map(r=>`
<div class="notify">
<b>${r.date}</b><br><br>

💧 Refilled: ${r.refilled} gallons<br>
📦 Sold: ${r.sold} gallons<br>
📉 Unsold: ${r.unsold} gallons<br>
📝 Reason: ${r.reason}
</div>
`).join("")
}

</div>

`;
}

/* LOGOUT POPUP */

function showLogoutPopup(){

const now = new Date();

document.getElementById("logoutDate").innerHTML =
"📅 Date: " + now.toDateString();

document.getElementById("logoutTime").innerHTML =
"⏰ Time Out: " + now.toLocaleTimeString();

document.getElementById("logoutPopup")
.style.display = "flex";

}

/* CONFIRM LOGOUT */

function confirmLogout(){

const now = new Date();

localStorage.setItem(
"managerLogoutDate",
now.toDateString()
);

localStorage.setItem(
"managerLogoutTime",
now.toLocaleTimeString()
);

alert("Logged Out Successfully ✅");

window.location.href = "login.html";

}

/* ALWAYS SHOW ATTENDANCE POPUP */

document.getElementById("attendancePopup")
.style.display = "flex";

/* DEFAULT */
/* LOAD SAVED DATA */

gallons = parseFloat(localStorage.getItem("gallons")) || 500;

totalGallonsSold =
parseFloat(localStorage.getItem("totalGallonsSold")) || 0;

filterLife =
parseFloat(localStorage.getItem("filterLife")) || 80;

inventoryLogs =
JSON.parse(localStorage.getItem("inventoryLogs")) || [];

let salesChart;

function renderAnalytics(){

const filter =
document.getElementById("analyticsFilter").value;

let labels = [];
let refillData = [];
let salesData = [];

const today =
new Date().toLocaleDateString();

if(filter === "today"){

const todayLogs =
inventoryLogs.filter(
log => log.date === today
);

labels = todayLogs.map(log => log.fullDate);

refillData =
todayLogs.map(log => log.refill);

salesData =
todayLogs.map(log => log.sold);

}

if(filter === "week"){

let grouped = {};

inventoryLogs.forEach(log=>{

grouped[log.date] =
(grouped[log.date] || 0)
+ log.sold;

});

labels = Object.keys(grouped);

salesData = Object.values(grouped);

refillData = Object.values(grouped);

}

if(filter === "month"){

let grouped = {};

inventoryLogs.forEach(log=>{

const month =
new Date(log.date)
.toLocaleString("default",
{month:"short"});

grouped[month] =
(grouped[month] || 0)
+ log.sold;

});

labels = Object.keys(grouped);

salesData = Object.values(grouped);

refillData = Object.values(grouped);

}

const ctx =
document.getElementById("salesChart");

if(salesChart){
salesChart.destroy();
}

salesChart = new Chart(ctx, {

type:"line",

data:{

labels:labels,

datasets:[

{
label:"Refill Gallons",
data:refillData,
borderColor:"#22c55e",
backgroundColor:"rgba(34,197,94,0.2)",
tension:.4,
fill:true
},

{
label:"Total Sales",
data:salesData,
borderColor:"#3b82f6",
backgroundColor:"rgba(59,130,246,0.2)",
tension:.4,
fill:true
}

]

},

options:{

responsive:true,

plugins:{

legend:{
labels:{
color:"white"
}
},

tooltip:{
callbacks:{

label:function(context){

return context.dataset.label +
": " +
context.raw + " gallons";

}

}

}

},

scales:{

x:{
ticks:{
color:"white"
}
},

y:{
ticks:{
color:"white"
}
}

}

}

});

}

dashboard();

</script>

</div>

</div>
</body>
