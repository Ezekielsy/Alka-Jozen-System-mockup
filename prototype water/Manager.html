<style>

*{
margin:0;
padding:0;

body{

135deg,
#0f4c75,
#3282b8,

@keyframes waterFlow{

/* MOBILE MENU */

.menu-btn{
display:none;
position:fixed;
top:15px;
left:15px;
z-index:99999;
padding:12px 16px;
border:none;
border-radius:12px;
background:#0f4c75;
color:white;
font-size:22px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
width:260px;
height:100vh;
background:rgba(15,76,117,0.92);
backdrop-filter:blur(20px);
padding:20px;
position:fixed;
border-right:1px solid rgba(255,255,255,0.15);
transition:.3s;
z-index:9999;
overflow-y:auto;
}

.brand{
font-size:26px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
color:#bbe1fa;
}

.sidebar button{
width:100%;
padding:16px;
margin:10px 0;
border:none;
border-radius:16px;
background:rgba(255,255,255,0.08);
color:white;
cursor:pointer;
font-size:15px;
transition:.3s;
text-align:left;
}

.sidebar button:hover{
background:rgba(255,255,255,0.18);
transform:translateX(5px);
}

/* MAIN */

.main{
margin-left:260px;
padding:30px;
width:100%;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.topbar h1{
font-size:32px;
color:#bbe1fa;
}

.clock{
padding:14px 20px;
background:rgba(255,255,255,0.08);
border-radius:16px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
padding:25px;
border-radius:24px;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
margin-bottom:20px;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.stat{
text-align:center;
}

.stat h2{
font-size:40px;
color:#bbe1fa;
}

.stat p{
margin-top:10px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:16px;
text-align:left;
}

th{
background:rgba(15,76,117,0.5);
color:#bbe1fa;
}

tr{
background:rgba(255,255,255,0.05);
}

tr:hover{
background:rgba(255,255,255,0.1);
}

/* BUTTONS */

.btn{
padding:14px 20px;
border:none;
border-radius:16px;
color:white;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

.blue{
background:#3b82f6;
}

.green{
background:#22c55e;
}

.orange{
background:#f97316;
}

/* STATUS */

.status{
padding:8px 14px;
border-radius:20px;
font-size:12px;
font-weight:bold;
display:inline-block;
}

.pending{
background:#f59e0b;
}

.delivered{
background:#22c55e;
}

.prepare{
background:#3b82f6;
}

/* NOTIFY */

.notify{
padding:16px;
border-radius:14px;
background:rgba(255,255,255,0.08);
margin:10px 0;
}

/* INPUT */

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:16px;
outline:none;
}

/* POPUP */

.popup-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
backdrop-filter:blur(8px);
}

.popup-card{
width:400px;
padding:35px;
border-radius:24px;

backdrop-filter:blur(20px);

text-align:center;
animation:popupShow .4s ease;
}

@keyframes popupShow{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}

/* RESPONSIVE */

@media(max-width:768px){

}

.sidebar{

}

.sidebar.active{

.topbar{

  function openReportForm(){
document.getElementById("reportPopup").style.display = "flex";

function closeReportForm(){
document.getElementById("reportPopup").style.display = "none";
}

function saveReport(){

let refilled = parseFloat(document.getElementById("repRefilled").value);
let sold = parseFloat(document.getElementById("repSold").value);
let unsold = parseFloat(document.getElementById("repUnsold").value);
let reason = document.getElementById("repReason").value;

if(isNaN(refilled) || isNaN(sold) || isNaN(unsold) || reason.trim() === ""){
alert("Please complete all fields");
return;
}

let report = {
date: new Date().toLocaleString(),
refilled,
sold,
unsold,
reason
};

reportsList.push(report);

localStorage.setItem("reportsList", JSON.stringify(reportsList));

closeReportForm();
reports();
}

  function showAttendanceCalendar(riderId, year = 2026, month = 4){
  const attendance = getAttendance();
  const data = attendance[riderId] || {};

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();

  let html = `
    <div class="card">
      <h2>📅 Attendance Calendar</h2>
      <p class="sub">Rider: ${riderId}</p>

      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:15px;">
        <b>Sun</b><b>Mon</b><b>Tue</b><b>Wed</b><b>Thu</b><b>Fri</b><b>Sat</b>
      </div>

      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px;">
  `;

  // blank spaces before 1st day
  for(let i=0;i<firstDay;i++){
    html += `<div></div>`;
  }

  for(let day=1; day<=daysInMonth; day++){

    let dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    let record = data[dateKey];

    let color = "#e5e7eb"; // default gray
    let text = day;

    if(record){
      if(record.status === "On-time") color = "#22c55e";
      else if(record.status === "Late") color = "#f59e0b";
      else if(record.status === "Pending") color = "#3b82f6";
      else if(record.status === "Absent") color = "#ef4444";

      text = `${day}<br><small>${record.loginTime}</small>`;
    }

    html += `
      <div style="
        background:${color};
        color:white;
        padding:10px;
        border-radius:12px;
        text-align:center;
        font-size:12px;
      ">
        ${text}
      </div>
    `;
  }

  html += `
      </div>
    </div>
  `;

  document.getElementById("content").innerHTML = html;
}

  function approveAttendance(riderId, dateKey){

  let attendance = getAttendance();

  if(attendance[riderId] && attendance[riderId][dateKey]){

    attendance[riderId][dateKey].status = "On-time";

    saveAttendance(attendance);

    notify("✅ Attendance Approved");
  }
}

function markAttendance(riderId){

  let attendance = getAttendance();

  let today = new Date();

  let dateKey = today.toISOString().split("T")[0];

  let time = today.toLocaleTimeString();

  if(!attendance[riderId]){
    attendance[riderId] = {};
  }

  attendance[riderId][dateKey] = {

    loginTime: time,

    status: "Pending"

  };

  saveAttendance(attendance);

  // ✅ CREATE NOTIFICATION

  notifications.push({

    id: Date.now(),

    riderId: riderId,

    riderName: riderId,

    date: dateKey,

    time: time,

    status: "Pending"

  });

  // ✅ SAVE

  localStorage.setItem(
    "notifications",
    JSON.stringify(notifications)
  );

}

  function generateCalendar(riderId, year, month){
  const attendance = getAttendance();
  const data = attendance[riderId] || {};

  let html = `<div class="card"><h2>📅 Attendance Calendar</h2>`;

  const daysInMonth = new Date(year, month + 1, 0).getDate();

  for(let day = 1; day <= daysInMonth; day++){
    let dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

    let record = data[dateKey];

    let status = "Absent";
    let time = "-";

    if(record){
      status = record.status;
      time = record.loginTime;
    }

    html += `
      <div class="card">
        <b>${dateKey}</b><br>
        🕒 ${time}<br>
        📌 ${status}
      </div>
    `;
  }

  html += `</div>`;

  document.getElementById("content").innerHTML = html;
}

  currentMonth += step;

function requestEdit(id){

let log = inventoryLogs.find(l => l.id === id);
if(!log) return;

log.editRequested = true;

notifications.push({
  id: "edit_" + id,
  type: "edit-request",
  logId: id,
  message: "Edit request for daily sales input",
  status: "Pending",
  date: new Date().toLocaleDateString(),
  time: new Date().toLocaleTimeString()
});

localStorage.setItem("inventoryLogs", JSON.stringify(inventoryLogs));

inventory();
}

/* ADD GALLONS */

function addSoldGallons(){

let input = document.getElementById("gallonInput").value;
let sold = parseFloat(input);

if(isNaN(sold) || sold <= 0){
alert("Invalid input");
return;
}

/* TOTAL GALLONS */
gallons += sold;

/* TOTAL SOLD */
totalGallonsSold += sold;

/* FILTER DAMAGE */
filterLife -= sold * 0.005;

if(filterLife < 0){
filterLife = 0;
}

/* SAVE HISTORY */
inventoryLogs.push({
  id: Date.now(),
  date: new Date().toLocaleDateString(),
  fullDate: new Date().toLocaleString(),
  totalInput: sold,
  impact: -(sold * 0.005).toFixed(2),
  status: "Unedited",
  editRequested: false,
  approved: false
});

/* SAVE LOCAL STORAGE */
localStorage.setItem("gallons", gallons);
localStorage.setItem("totalGallonsSold", totalGallonsSold);
localStorage.setItem("filterLife", filterLife);
localStorage.setItem("inventoryLogs", JSON.stringify(inventoryLogs));

/* FILTER WARNING */
if(filterLife <= 10){
notifications.push("⚠ Filter replacement needed");
}

document.getElementById("gallonInput").value = "";

inventory();

}

function approveRider(id){

  notifications =
  JSON.parse(localStorage.getItem("notifications")) || [];

  let notif =
  notifications.find(n => n.id == id);

  if(!notif) return;

  notif.status = "Approved";

  localStorage.setItem(
    "notifications",
    JSON.stringify(notifications)
  );

  alert("Attendance Approved ✅");

  showNotifications();
}

function rejectRider(id){

  notifications =
  JSON.parse(localStorage.getItem("notifications")) || [];

  let notif =
  notifications.find(n => n.id == id);

  if(!notif) return;

  notif.status = "Rejected";

  localStorage.setItem(
    "notifications",
    JSON.stringify(notifications)
  );

  alert("Attendance Rejected ❌");

  showNotifications();
}

      ]
    },

    options:{

          },

          }
        }

      }

    }

  });

}
