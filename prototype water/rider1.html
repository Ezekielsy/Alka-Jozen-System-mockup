<!DOCTYPE html>

<html>
<head>
<title>Alka-Jozen Rider Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f1f5f9;
}

.sidebar {
  width: 240px;
  background: #0f172a;
  color: white;
  padding: 20px;
  position: fixed;
  height: 100vh;
}

.brand {
  font-size: 20px;
  font-weight: bold;
  color: #38bdf8;
  margin-bottom: 20px;
}

.sidebar button {
  width: 100%;
  background: transparent;
  border: none;
  color: white;
  padding: 12px;
  text-align: left;
  cursor: pointer;
  border-radius: 8px;
  margin: 4px 0;
}

.sidebar button:hover {
  background: rgba(56,189,248,0.15);
}

.content {
  margin-left: 240px;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

.step-btn {
  width: 100%;
  padding: 10px;
  margin: 4px 0;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #e2e8f0;
}

.active-step {
  background: #22c55e !important;
  color: white;
}

/* MAP */
#mapPopup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
}

.map-box {
  width: 95%;
  max-width: 420px;
  background: white;
  border-radius: 12px;
  overflow: hidden;
}

.map-area {
  position: relative;
  width: 100%;
  height: 300px;
  background: #dbeafe;
}

.road {
  position: absolute;
  top: 50%;
  left: 10%;
  width: 80%;
  height: 4px;
  background: #94a3b8;
}

.start { position: absolute; top:45%; left:10%; }
.dest { position: absolute; top:45%; right:10%; }

#rider {
  position: absolute;
  top: 45%;
  left: 10%;
  transition: 1.5s linear;
}

.status {
  text-align: center;
  padding: 10px;
}

.close-btn {
  width: 100%;
  padding: 12px;
  border: none;
  background: #0ea5e9;
  color: white;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="brand">🚴 Alka-Jozen Rider</div>

  <button onclick="loadOrders()">📦 Incoming</button>
  <button onclick="active()">🛵 Active</button>
  <button onclick="earnings()">💰 Earnings</button>
  <button onclick="delivered()">🎉 Delivered</button>
</div>

<div class="content" id="content"></div>

<script>

/* ================= STORAGE ================= */
function getOrders(){
  return JSON.parse(localStorage.getItem("history")) || [];
}

function save(data){
  localStorage.setItem("history", JSON.stringify(data));
}

/* ================= RIDER NAME ================= */
function getRiderName(){
  return localStorage.getItem("username") || "Unknown Rider";
}

/* ================= SAFE USER NAME ================= */
function getName(o){
  return o.name || o.user || "Unknown";
}

/* ================= LOAD ================= */
loadOrders();

function loadOrders(){

  let o = getOrders();
  let html = "<h2>📦 Incoming Orders</h2>";
  let has = false;

  o.forEach((x,i)=>{

    if(x.status !== "Order Received") return;

    has = true;

    html += `
      <div class="card">
        📦 ${x.orderNumber}<br>
        👤 ${getName(x)}<br>
        📞 ${x.contact}<br>
        📍 ${x.address}<br>

        <button class="step-btn" onclick="accept(${i})">
          Accept Order
        </button>
      </div>
    `;
  });

  if(!has) html += "<p>No incoming orders</p>";

  document.getElementById("content").innerHTML = html;
}

/* ================= ACCEPT (FIXED) ================= */
function accept(i){

  let o = getOrders();

  o[i].status = "Go to Pickup";

  // 🔥 FIX: SAVE RIDER NAME
  o[i].rider = getRiderName();

  save(o);

  active();
}

/* ================= ACTIVE ================= */
function active(){

  let o = getOrders();
  let html = "<h2>🛵 Active Deliveries</h2>";
  let found = false;

  o.forEach((x,i)=>{

    if(x.status === "Order Received" || x.status === "Delivered") return;

    found = true;

    html += `
      <div class="card">
        📦 ${x.orderNumber}<br>
        👤 ${getName(x)}<br>
        🚴 Rider: ${x.rider || "Unassigned"}<br>
        📍 ${x.address}<br>
        🚦 ${x.status}

        <br><br>

        ${statusUI(i, x.status)}
      </div>
    `;
  });

  if(!found) html += "<p>No active deliveries</p>";

  document.getElementById("content").innerHTML = html;
}

/* ================= STATUS BUTTONS ================= */
function statusUI(i, current){

  let flow = [
    "Go to Pickup",
    "Collecting Gallon",
    "Cleaning",
    "Refilling",
    "Out for Delivery",
    "Delivered"
  ];

  return flow.map(step=>`
    <button class="step-btn ${current===step?'active-step':''}"
      onclick="setStatus(${i}, '${step}')">
      ${step}
    </button>
  `).join("");
}

/* ================= UPDATE STATUS ================= */
function setStatus(i, status){

  let o = getOrders();
  o[i].status = status;
  save(o);

  if(status === "Out for Delivery"){
    showMap(o[i]);
  }

  active();
}

/* ================= MAP ================= */
function showMap(order){

  let popup = document.createElement("div");
  popup.id = "mapPopup";

  popup.innerHTML = `
    <div class="map-box">

      <div style="text-align:center;padding:10px;">
        <h3>🚴 Live Tracking</h3>
        <p><b>${getName(order)}</b></p>
        <p>🚴 ${order.rider || "No Rider"}</p>
        <p>${order.address}</p>
      </div>

      <div class="map-area">
        <div class="road"></div>
        <div class="start">🚴</div>
        <div class="dest">🏠</div>
        <div id="rider">🚴</div>
      </div>

      <div class="status" id="statusText">
        Starting delivery...
      </div>

      <button class="close-btn" onclick="closeMap()">Close</button>

    </div>
  `;

  document.body.appendChild(popup);
  animateRider();
}

/* ================= ANIMATION ================= */
function animateRider(){

  let rider = document.getElementById("rider");
  let text = document.getElementById("statusText");

  let pos = 10;

  let interval = setInterval(()=>{

    if(pos >= 80){

      clearInterval(interval);
      rider.style.left = "80%";
      text.innerHTML = "🎉 DELIVERED!";

      let o = getOrders();
      let order = o.find(x=>x.status==="Out for Delivery");
      if(order) order.status = "Delivered";
      save(o);

      setTimeout(closeMap, 2000);
      return;
    }

    pos += 12;
    rider.style.left = pos + "%";

  },1500);
}

/* ================= CLOSE ================= */
function closeMap(){
  let el = document.getElementById("mapPopup");
  if(el) el.remove();
}

/* ================= EARNINGS ================= */
function earnings(){

  let rider = getRiderName();

  let o = getOrders().filter(x=>
    x.status==="Delivered" && x.rider===rider
  );

  let total = o.reduce((s,x)=>s+Number(x.total||0),0);

  document.getElementById("content").innerHTML = `
    <h2>💰 Earnings</h2>
    <div class="card">
      🚴 Rider: ${rider}<br>
      Delivered: ${o.length}<br>
      Income: ₱${total}
    </div>
  `;
}

/* ================= DELIVERED ================= */
function delivered(){

  let rider = getRiderName();

  let o = getOrders().filter(x=>
    x.status==="Delivered" && x.rider===rider
  );

  let html = "<h2>🎉 Delivered Orders</h2>";

  o.forEach(x=>{
    html += `
      <div class="card">
        📦 ${x.orderNumber}<br>
        👤 ${getName(x)}<br>
        💰 ₱${x.total}
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}

</script>

</body>
</html>
