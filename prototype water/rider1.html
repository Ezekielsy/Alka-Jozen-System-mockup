<!DOCTYPE html>
<html>
<head>
<title>Alka-Jozen Rider Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',sans-serif;

  background:
  linear-gradient(135deg,#dbeafe,#eff6ff,#f8fafc);

  min-height:100vh;
  overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
  width:250px;
  height:100vh;

  position:fixed;
  left:0;
  top:0;

  padding:25px 18px;

  background:
  linear-gradient(180deg,#0f172a,#111827);

  box-shadow:
  10px 0 30px rgba(0,0,0,.15);

  z-index:100;
}

.brand{
  font-size:24px;
  font-weight:800;
  color:#38bdf8;
  text-align:center;
  margin-bottom:35px;

  text-shadow:
  0 0 20px rgba(56,189,248,.5);
}

.sidebar button{
  width:100%;
  border:none;

  padding:16px;
  margin-bottom:12px;

  border-radius:18px;

  background:rgba(255,255,255,.05);

  color:white;
  font-weight:700;
  font-size:15px;

  text-align:left;
  cursor:pointer;

  transition:.3s;
}

.sidebar button:hover{
  transform:translateX(5px);

  background:
  linear-gradient(90deg,#0ea5e9,#38bdf8);

  box-shadow:
  0 10px 25px rgba(14,165,233,.35);
}

/* CONTENT */

.content{
  margin-left:250px;
  padding:35px;
}

/* TITLE */

h2{
  color:#0f172a;
  margin-bottom:20px;
  font-size:30px;
}

/* GLASS CARD */

.card{

  background:
  rgba(255,255,255,.45);

  backdrop-filter:blur(18px);

  border:
  1px solid rgba(255,255,255,.5);

  border-radius:28px;

  padding:24px;

  margin-bottom:20px;

  box-shadow:
  0 10px 35px rgba(0,0,0,.08);

  transition:.3s ease;

  animation:fade .4s ease;
}

.card:hover{
  transform:translateY(-5px);

  box-shadow:
  0 20px 40px rgba(14,165,233,.18);
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* ORDER INFO */

.order-top{
  cursor:pointer;
  line-height:2;
  color:#334155;
}

/* BUTTONS */

.step-btn{
  width:100%;
  border:none;

  padding:14px;
  margin-top:10px;

  border-radius:15px;

  background:#e2e8f0;

  font-weight:700;

  cursor:pointer;

  transition:.25s;
}

.step-btn:hover{
  transform:translateY(-2px);
}

.active-step{
  background:
  linear-gradient(90deg,#22c55e,#16a34a)!important;

  color:white;

  box-shadow:
  0 10px 20px rgba(34,197,94,.3);
}

/* MODAL */

.modal{
  position:fixed;
  inset:0;

  background:rgba(15,23,42,.6);

  display:flex;
  justify-content:center;
  align-items:center;

  z-index:999;

  backdrop-filter:blur(6px);
}

.modal-box{

  width:92%;
  max-width:450px;

  background:white;

  border-radius:30px;

  padding:25px;

  animation:pop .3s ease;
}

@keyframes pop{
  from{
    transform:scale(.9);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}

.close-btn{
  width:100%;
  border:none;

  padding:15px;
  margin-top:18px;

  border-radius:15px;

  background:
  linear-gradient(90deg,#0ea5e9,#38bdf8);

  color:white;

  font-weight:700;

  cursor:pointer;
}

/* RATING */

.rating{
  color:#f59e0b;
  font-size:18px;
  margin-top:10px;
}

/* CHART */

.chart-box{
  margin-top:25px;
}

/* MOBILE */

@media(max-width:768px){

  .sidebar{
    width:100%;
    height:auto;
    position:relative;
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:12px;
  }

  .brand{
    display:none;
  }

  .sidebar button{
    flex:1;
    white-space:nowrap;
    font-size:13px;
    padding:12px;
    border-radius:12px;
  }

  .content{
    margin-left:0;
    padding:15px;
  }

  h2{
    font-size:22px;
  }

  .card{
    padding:16px;
    border-radius:18px;
  }

  .step-btn{
    padding:14px;
    font-size:14px;
    margin-top:12px;
  }

  .modal-box{
    width:95%;
    padding:18px;
    border-radius:20px;
  }

}

.card{
  word-wrap:break-word;
  line-height:1.6;
}

</style>
</head>

<body>

<div class="sidebar">

  <div class="brand">
    🚴 Alka-Jozen Rider
  </div>

  <button onclick="loadOrders()">📦 Incoming</button>
  <button onclick="active()">🛵 Active</button>
  <button onclick="earnings()">💰 Earnings</button>
  <button onclick="delivered()">🎉 Delivered</button>

</div>

<div class="content" id="content"></div>

<script>

/* ================= STORAGE ================= */

function getOrders(){
  return JSON.parse(localStorage.getItem("history")) || [];
}

function save(data){
  localStorage.setItem("history",JSON.stringify(data));
}

function getRiderName(){
  return localStorage.getItem("username") || "Unknown Rider";
}

function getName(o){
  return o.name || o.user || "Unknown";
}

/* ================= LOAD ================= */

loadOrders();

function loadOrders(){

let html = "<h2>📦 Incoming Orders</h2>";

html += `
<div class="card">

📦 #001<br>
👤 Juan Dela Cruz<br>
📍 Urduja, Caloocan City<br>

<button class="step-btn" onclick="accept(0)">
Accept Order
</button>

</div>
`;

document.getElementById("content").innerHTML = html;
}

/* ================= ACCEPT ================= */

function accept(i){

  let o = getOrders();

  o[i].status = "Go to Pickup";
  o[i].rider = getRiderName();

  save(o);

  active();
}

/* ================= ACTIVE ================= */

/* ================= ACTIVE DELIVERIES (WORKING FLOW) ================= */

function active(){

  let o = getOrders();

  let html = "<h2>🛵 Active Deliveries</h2>";

  let found = false;

  o.forEach((x,i)=>{

    if(x.status === "Order Received" || x.status === "Delivered") return;

    found = true;

    html += `
      <div class="card">

        📦 #001<br>
        👤 Juan Dela Cruz<br>
        🚴 Rider: ${getRiderName()}<br>
        📍 Urduja, Caloocan City<br>
        🚦 Current: <b>${x.status}</b><br>

        <div style="margin-top:10px;">
          ${statusUI(i, x.status)}
        </div>

        <button class="step-btn" onclick="showDetails(${i})">
        📦 View Details
        </button>

      </div>
    `;
  });

  if(!found){

    // SAMPLE DISPLAY kapag walang real data
    html += `
      <div class="card">

        📦 #001<br>
        👤 Juan Dela Cruz<br>
        🚴 Rider: ${getRiderName()}<br>
        📍 Urduja, Caloocan City<br>
        🚦 Current: Go to Pickup<br>

        <div style="margin-top:10px;">
          <button class="step-btn active-step">Go to Pickup</button>
          <button class="step-btn">Collecting Gallon</button>
          <button class="step-btn">Cleaning</button>
          <button class="step-btn">Refilling</button>
          <button class="step-btn">Out for Delivery</button>
          <button class="step-btn">Delivered</button>
        </div>

        <button class="step-btn" onclick="alert('Example order only')">
        📦 View Details
        </button>

      </div>
    `;
  }

  document.getElementById("content").innerHTML = html;
}


/* ================= STATUS FLOW BUTTONS ================= */

function statusUI(i,current){

  let flow = [
    "Go to Pickup",
    "Collecting Gallon",
    "Cleaning",
    "Refilling",
    "Out for Delivery",
    "Delivered"
  ];

  return flow.map(step => {

    let active = current === step ? "active-step" : "";

    return `
      <button class="step-btn ${active}"
        onclick="setStatus(${i}, '${step}')">
        ${step}
      </button>
    `;
  }).join("");
}


/* ================= UPDATE STATUS ================= */

function setStatus(i,status){

  let o = getOrders();

  o[i].status = status;

  // kapag Delivered, auto assign rider confirm
  if(status === "Delivered"){
    o[i].deliveredAt = new Date().toLocaleString();
  }

  save(o);

  active(); // refresh UI
}

/* ================= TOGGLE ================= */

function toggleSteps(i){

  let el = document.getElementById("steps-"+i);

  if(el.style.display==="none"){
    el.style.display="block";
  }else{
    el.style.display="none";
  }
}

/* ================= STATUS UI ================= */

function statusUI(i,current){

  let flow = [
    "Go to Pickup",
    "Collecting Gallon",
    "Cleaning",
    "Refilling",
    "Out for Delivery",
    "Delivered"
  ];

  return flow.map(step=>`

    <button class="step-btn
    ${current===step?'active-step':''}"

    onclick="setStatus(${i},'${step}')">

    ${step}

    </button>

  `).join("");
}

/* ================= SET STATUS ================= */

function setStatus(i,status){

  let o = getOrders();

  o[i].status = status;

  save(o);

  active();
}

/* ================= DETAILS MODAL ================= */

function showDetails(i){

  let o = getOrders();

  let x = o[i];

  let modal = document.createElement("div");

  modal.className = "modal";

  modal.id = "modal";

  modal.innerHTML = `

  <div class="modal-box">

    <h2>📦 Order Details</h2>

    <br>

    <p><b>Order:</b> ${x.orderNumber}</p>
    <p><b>Customer:</b> ${getName(x)}</p>
    <p><b>Contact:</b> ${x.contact}</p>
    <p><b>Address:</b> ${x.address}</p>
    <p><b>Total:</b> ₱${x.total || 0}</p>
    <p><b>Status:</b> ${x.status}</p>

    <div class="rating">
      ⭐⭐⭐⭐⭐
    </div>

    <button class="close-btn"
    onclick="closeModal()">
    Close
    </button>

  </div>
  `;

  document.body.appendChild(modal);
}

function closeModal(){

  let m = document.getElementById("modal");

  if(m) m.remove();
}

/* ================= EARNINGS ================= */

function earnings(){

  let rider = getRiderName();

  let o = getOrders().filter(x=>
    x.status==="Delivered" &&
    x.rider===rider
  );

  let today = 0;
  let week = 0;
  let month = 0;

  o.forEach(x=>{

    let total = Number(x.total || 0);

    today += total;
    week += total;
    month += total;
  });

  document.getElementById("content").innerHTML = `

    <h2>💰 Earnings Dashboard</h2>

    <div class="card">

      🚴 Rider: ${rider}<br><br>

      💵 Today Income: ₱${today}<br>
      📅 Weekly Income: ₱${week}<br>
      🗓 Monthly Income: ₱${month}<br>
      📦 Completed Deliveries: ${o.length}

      <div class="chart-box">
        <canvas id="earnChart"></canvas>
      </div>

    </div>
  `;

  setTimeout(renderChart,100);
}

/* ================= CHART ================= */

function renderChart(){

  let ctx =
  document.getElementById("earnChart");

  new Chart(ctx,{

    type:'bar',

    data:{
      labels:[
        'Today',
        'Weekly',
        'Monthly'
      ],

      datasets:[{
        label:'Income',

        data:[
          1200,
          5400,
          14000
        ],

        borderRadius:12
      }]
    },

    options:{
      responsive:true
    }
  });
}

/* ================= DELIVERED (SAMPLE ONLY) ================= */

function delivered(){

document.getElementById("content").innerHTML = `

<h2>🎉 Delivered Orders</h2>

<div class="card">

📦 #001<br>
👤 Juan Dela Cruz<br>
🚴 Rider: ${getRiderName()}<br>
💰 ₱150<br>
📍 Urduja, Caloocan City<br>

<div class="rating">
⭐⭐⭐⭐⭐
</div>

</div>

`;
}

</script>

</body>
</html>
