<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alka-Jozen Customer</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
    scroll-behavior:smooth;
}

body{
    background:
    linear-gradient(
        135deg,
        #eff6ff,
        #dbeafe,
        #f8fafc
    );

    overflow-x:hidden;
}

/* BUBBLES */

.bubble{
    position:fixed;
    border-radius:50%;
    background:rgba(56,189,248,0.08);
    animation:float 10s infinite ease-in-out;
    z-index:0;
}

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-20px);
    }

    100%{
        transform:translateY(0);
    }
}

.b1{
    width:140px;
    height:140px;
    top:8%;
    left:5%;
}

.b2{
    width:90px;
    height:90px;
    bottom:10%;
    left:15%;
}

.b3{
    width:180px;
    height:180px;
    top:15%;
    right:8%;
}

.b4{
    width:100px;
    height:100px;
    bottom:12%;
    right:15%;
}

/* WRAPPER */

.wrapper{
    display:flex;
    min-height:100vh;
    position:relative;
    z-index:1;
}

/* SIDEBAR */

.sidebar{

    width:260px;

    background:
    linear-gradient(
        180deg,
        #0f172a,
        #0b1220
    );

    padding:25px 18px;

    color:white;

    box-shadow:
    5px 0 25px rgba(0,0,0,0.15);
}

.brand{

    font-size:28px;
    font-weight:800;

    color:#38bdf8;

    text-align:center;

    margin-bottom:35px;
}

/* MENU */

.menu-btn{

    width:100%;

    padding:15px;

    margin-bottom:12px;

    border:none;

    border-radius:16px;

    background:
    rgba(255,255,255,0.05);

    color:white;

    text-align:left;

    cursor:pointer;

    display:flex;
    align-items:center;
    gap:10px;

    transition:.25s;
}

.menu-btn:hover{

    transform:translateX(5px);

    background:
    rgba(56,189,248,0.15);
}

.menu-btn.active{

    background:
    rgba(56,189,248,0.18);

    border-left:
    4px solid #38bdf8;
}

/* CONTENT */

.content{
    flex:1;
    padding:35px;
}

/* GLASS CARDS */

.card,
.order-card,
.track-card,
.profile-card{

    background:
    rgba(255,255,255,0.60);

    backdrop-filter:
    blur(18px);

    border:
    1px solid rgba(255,255,255,0.45);

    border-radius:28px;

    padding:25px;

    margin-bottom:22px;

    box-shadow:
    0 10px 40px rgba(0,0,0,0.08);

    transition:.25s ease;
}

.card:hover,
.order-card:hover,
.track-card:hover{

    transform:translateY(-4px);

    box-shadow:
    0 15px 35px rgba(56,189,248,0.15);
}

h2{
    color:#0f172a;
    margin-bottom:10px;
}

.sub{
    color:#64748b;
}

/* INPUTS */

input,
select,
textarea{

    width:100%;

    padding:15px;

    margin-top:15px;

    border:none;

    border-radius:16px;

    background:#f8fafc;

    outline:none;
}

/* BUTTON */

.primary-btn{

    width:100%;

    padding:15px;

    margin-top:18px;

    border:none;

    border-radius:16px;

    background:
    linear-gradient(
        90deg,
        #0ea5e9,
        #38bdf8
    );

    color:white;

    font-weight:700;

    cursor:pointer;

    transition:.25s;
}

.primary-btn:hover{

    transform:translateY(-2px);
}

/* STATUS */

.status{

    padding:8px 15px;

    border-radius:999px;

    font-size:12px;

    font-weight:700;
}

.pending{
    background:#fff7ed;
    color:#f59e0b;
}

.delivery{
    background:#eff6ff;
    color:#3b82f6;
}

.done-status{
    background:#ecfdf5;
    color:#22c55e;
}

/* TRACK */

.track-wrapper{
    margin-top:40px;
    position:relative;
}

.track-line{

    position:absolute;

    top:28px;
    left:8%;

    width:84%;
    height:6px;

    background:#d1d5db;

    border-radius:999px;
}

.track-progress{

    display:flex;
    justify-content:space-between;

    position:relative;
}

.track-step{
    width:20%;
    text-align:center;
}

.circle{

    width:60px;
    height:60px;

    border-radius:50%;

    background:#d1d5db;

    display:flex;
    align-items:center;
    justify-content:center;

    margin:auto;

    color:white;

    font-size:22px;

    border:5px solid white;
}

.active{
    background:#22c55e;
}

.current{
    background:#2563eb;
}

.track-label{

    margin-top:10px;

    font-size:12px;
    font-weight:700;
}

/* ETA */

.eta-box{

    margin-top:18px;

    padding:16px;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #dbeafe,
        #eff6ff
    );

    font-weight:700;
}

/* CHAT */

.chat-btn{

    position:fixed;

    right:25px;
    bottom:90px;

    width:65px;
    height:65px;

    border:none;

    border-radius:50%;

    background:
    linear-gradient(
        90deg,
        #0ea5e9,
        #38bdf8
    );

    color:white;

    font-size:24px;

    cursor:pointer;

    z-index:9999;
}

.chat-box{

    position:fixed;

    right:25px;
    bottom:165px;

    width:340px;
    height:420px;

    background:white;

    border-radius:28px;

    overflow:hidden;

    display:none;
    flex-direction:column;

    box-shadow:
    0 10px 40px rgba(0,0,0,0.18);

    z-index:9999;
}

.chat-header{

    padding:18px;

    background:
    linear-gradient(
        90deg,
        #0ea5e9,
        #38bdf8
    );

    color:white;
    font-weight:700;
}

.chat-body{

    flex:1;

    padding:15px;

    overflow-y:auto;

    background:#f8fafc;
}

.chat-input{
    display:flex;
}

.chat-input input{

    margin:0;
    border-radius:0;
}

.chat-input button{

    width:90px;

    border:none;

    background:#0ea5e9;

    color:white;
}

/* NOTIFY */

.notify{

    position:fixed;

    top:20px;
    right:20px;

    background:
    linear-gradient(
        90deg,
        #22c55e,
        #16a34a
    );

    color:white;

    padding:15px 22px;

    border-radius:18px;

    z-index:99999;

    animation:slide .4s ease;
}

@keyframes slide{

    from{
        transform:translateX(100%);
        opacity:0;
    }

    to{
        transform:translateX(0);
        opacity:1;
    }
}

/* STARS */

.stars{

    display:flex;
    gap:8px;

    margin-top:18px;
}

.stars i{

    font-size:30px;

    color:#d1d5db;

    cursor:pointer;
}

.stars i.active{
    color:#f59e0b;
}

/* BOTTOM NAV */

.bottom-nav{

    position:fixed;

    bottom:0;
    left:0;

    width:100%;
    height:75px;

    background:
    rgba(255,255,255,0.75);

    backdrop-filter:
    blur(18px);

    border-top:
    1px solid rgba(255,255,255,0.45);

    display:none;

    justify-content:space-around;
    align-items:center;

    z-index:9999;
}

.bottom-nav button{

    background:none;
    border:none;

    display:flex;
    flex-direction:column;
    align-items:center;

    gap:4px;

    color:#64748b;

    cursor:pointer;
}

.bottom-nav button.active{
    color:#0ea5e9;
}

/* MOBILE */

@media(max-width:768px){

    .sidebar{
        display:none;
    }

    .content{
        padding:20px;
        padding-bottom:100px;
    }

    .bottom-nav{
        display:flex;
    }

    .circle{
        width:50px;
        height:50px;
    }

    .track-label{
        font-size:10px;
    }
}

</style>
</head>

<body>

<div class="bubble b1"></div>
<div class="bubble b2"></div>
<div class="bubble b3"></div>
<div class="bubble b4"></div>

<div class="wrapper">

<div class="sidebar">

<div class="brand">
💧 Alka-Jozen
</div>

<button class="menu-btn active"
onclick="home()">
<i class="fa fa-house"></i>
Home
</button>

<button class="menu-btn"
onclick="newOrder()">
<i class="fa fa-cart-shopping"></i>
New Order
</button>

<button class="menu-btn"
onclick="trackOrder()">
<i class="fa fa-box"></i>
Tracking
</button>

<button class="menu-btn"
onclick="paymentHistory()">
<i class="fa fa-credit-card"></i>
Payments
</button>

<button class="menu-btn"
onclick="profile()">
<i class="fa fa-user"></i>
Profile
</button>

</div>

<div class="content">

<div id="content"></div>

</div>

</div>

<!-- FAQ AI -->

<button class="chat-btn" onclick="toggleFAQ()">
<i class="fa fa-robot"></i>
</button>

<div class="chat-box" id="faqBox">

<div class="chat-header">
FAQ Assistant
</div>

<div class="chat-body" id="faqBody">

<p><b>AI:</b> Hi! Ask me about delivery time, payment, or orders.</p>

</div>

<div class="chat-input">

<input id="faqInput" placeholder="Ask something...">

<button onclick="sendFAQ()">Send</button>

</div>

</div>
<!-- BOTTOM NAV -->

<div class="bottom-nav">

<button onclick="home()">
<i class="fa fa-house"></i>
<span>Home</span>
</button>

<button onclick="newOrder()">
<i class="fa fa-cart-shopping"></i>
<span>Order</span>
</button>

<button onclick="trackOrder()">
<i class="fa fa-truck"></i>
<span>Track</span>
</button>

<button onclick="paymentHistory()">
<i class="fa fa-credit-card"></i>
<span>Payments</span>
</button>

<button onclick="profile()">
<i class="fa fa-user"></i>
<span>Profile</span>
</button>

</div>

<script>

/* STORAGE */

function getOrders(){

    return JSON.parse(
    localStorage.getItem("history")
    ) || [];
}

function saveOrders(data){

    localStorage.setItem(
    "history",
    JSON.stringify(data)
    );
}

function getUser(){

    return localStorage.getItem(
    "username"
    ) || "Guest";
}

/* STEPS */

const steps = [

    {
        label:"Pickup"
    },

    {
        label:"Cleaning"
    },

    {
        label:"Refilling"
    },

    {
        label:"Out for Delivery"
    },

    {
        label:"Delivered"
    }
];

/* HOME */

function home(){

    let user = getUser();

    let orders =
    getOrders().filter(
    o=>o.user===user
    );

    let html = `

    <div class="card">

        <h2>
        👋 Welcome ${user}
        </h2>

        <p class="sub">
        Your Orders Dashboard
        </p>

    </div>
    `;

    orders.reverse().slice(0,5)
    .forEach(o=>{

        html += `

        <div class="card">

            <b>
            Order #${o.orderNumber}
            </b>

            <br><br>

            📍 ${o.address}

            <br><br>

            <div class="status delivery">

            ${o.status || "Pending"}

            </div>

        </div>
        `;
    });

    document.getElementById(
    "content"
    ).innerHTML = html;
}

/* NEW ORDER */

function newOrder(){

    document.getElementById("content").innerHTML = `

    <div class="card">

        <h2>🛒 New Order</h2>

        <input id="gallon" placeholder="💧 Gallons">
        <input id="address" placeholder="📍 Address">
        <input id="contact" placeholder="📞 Contact">

        <select id="payment" onchange="showGCash()">
            <option value="Cash">Cash</option>
            <option value="GCash">GCash</option>
        </select>

        <!-- GCASH BOX -->
        <div id="gcashBox" style="display:none;margin-top:15px;">

            <div style="
                background:#f8fafc;
                padding:20px;
                border-radius:18px;
                text-align:center;
                border:2px dashed #38bdf8;
            ">

                <h3>💳 GCash Payment</h3>

                <img src="gcashqr.png"
                style="width:200px;border-radius:12px;margin-top:10px;">

                <p style="margin-top:10px;">
                    Send to: <b>09123456789</b>
                </p>

                <input id="reference"
                placeholder="Enter GCash Reference Number">

            </div>

        </div>

        <button class="primary-btn" onclick="saveOrder()">
            Place Order
        </button>

    </div>
    `;
}

function showGCash(){

    let payment = document.getElementById("payment").value;
    let box = document.getElementById("gcashBox");

    if(payment === "GCash"){
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
}

/* SAVE */

function saveOrder(){

    let orders =
    getOrders();

    let order = {

        orderNumber:
        String(
        orders.length+1
        ).padStart(3,"0"),

        user:getUser(),

        gallon:
        document.getElementById(
        "gallon"
        ).value,

        address:
        document.getElementById(
        "address"
        ).value,

        contact:
        document.getElementById(
        "contact"
        ).value,

        payment:
        document.getElementById(
        "payment"
        ).value,

        status:"Go to Pickup",

        total:150
    };

    orders.push(order);

    saveOrders(orders);

    notify(
    "✅ Order Placed"
    );

    home();
}

/* TRACK */

function trackOrder(){

    let user =
    getUser();

    let orders =
    getOrders().filter(
    o=>o.user===user
    );

    let html = `

    <div class="card">

        <h2>
        📦 Tracking Orders
        </h2>

    </div>
    `;

    orders.forEach(o=>{

        html += `

        <div class="card"
        onclick="viewTrack(
        '${o.orderNumber}'
        )">

            <b>
            #${o.orderNumber}
            </b>

            <br><br>

            ${o.status}

        </div>
        `;
    });

    document.getElementById(
    "content"
    ).innerHTML = html;
}

/* ETA */

function getETA(status){

    if(status==="Go to Pickup")
    return "20 mins";

    if(status==="Collecting Gallon")
    return "15 mins";

    if(status==="Cleaning")
    return "10 mins";

    if(status==="Refilling")
    return "8 mins";

    if(status==="Out for Delivery")
    return "5 mins";

    if(status==="Delivered")
    return "Delivered";

    return "Pending";
}

/* VIEW TRACK */

function viewTrack(id){

    let orders =
    getOrders();

    let o =
    orders.find(
    x=>x.orderNumber==id
    );

    let current =
    steps.findIndex(
    s=>s.label===o.status
    );

    if(current < 0)
    current = 0;

    let html = `

    <div class="card">

        <h2>
        📍 Tracking
        </h2>

        <p class="sub">

        Rider:
        <b>

        ${o.rider || "Waiting Rider"}

        </b>

        </p>

        <div class="eta-box">

        🚚 ETA:
        ${getETA(o.status)}

        </div>

        <div class="track-wrapper">

        <div class="track-line"></div>

        <div class="track-progress">
    `;

    steps.forEach((s,index)=>{

        let className="";

        if(index < current)
        className="active";

        if(index===current)
        className="current";

        if(o.status==="Delivered")
        className="active";

        html += `

        <div class="track-step">

            <div class="circle ${className}">

            ${index+1}

            </div>

            <div class="track-label">

            ${s.label}

            </div>

        </div>
        `;
    });

    html += `

        </div>
        </div>
    `;

    if(o.status==="Delivered"){

        html += `

        <div style="margin-top:35px;">

            <h3>
            ⭐ Rate Rider
            </h3>

            <div class="stars">

            <i class="fa-solid fa-star"
            onclick="rateOrder(1)">
            </i>

            <i class="fa-solid fa-star"
            onclick="rateOrder(2)">
            </i>

            <i class="fa-solid fa-star"
            onclick="rateOrder(3)">
            </i>

            <i class="fa-solid fa-star"
            onclick="rateOrder(4)">
            </i>

            <i class="fa-solid fa-star"
            onclick="rateOrder(5)">
            </i>

            </div>

            <textarea
            id="review"
            placeholder="Write review...">
            </textarea>

            <button
            class="primary-btn"
            onclick="submitReview(
            '${o.orderNumber}'
            )">

            Submit Review

            </button>

        </div>
        `;
    }

    html += `</div>`;

    document.getElementById(
    "content"
    ).innerHTML = html;
}

/* RATE */

let selectedRate = 0;

function rateOrder(rate){

    selectedRate = rate;

    let stars =
    document.querySelectorAll(
    ".stars i"
    );

    stars.forEach((s,index)=>{

        if(index < rate){

            s.classList.add("active");

        }else{

            s.classList.remove("active");
        }
    });
}

/* SAVE REVIEW */

function submitReview(id){

    let orders =
    getOrders();

    let order =
    orders.find(
    x=>x.orderNumber==id
    );

    order.rating =
    selectedRate;

    order.review =
    document.getElementById(
    "review"
    ).value;

    saveOrders(orders);

    notify(
    "⭐ Review Submitted"
    );

    trackOrder();
}

/* PAYMENTS */

function paymentHistory(){

    let user =
    getUser();

    let orders =
    getOrders().filter(
    o=>o.user===user
    );

    let html = `

    <div class="card">

        <h2>
        💳 Payment History
        </h2>

    </div>
    `;

    orders.reverse()
    .forEach(o=>{

        html += `

        <div class="card">

            <b>
            #${o.orderNumber}
            </b>

            <br><br>

            ${o.payment}

            <br><br>

            ₱${o.total || 0}

        </div>
        `;
    });

    document.getElementById(
    "content"
    ).innerHTML = html;
}

/* PROFILE */

function profile(){

    let username = getUser();

    let orders = getOrders()
    .filter(o => o.user === username);

    let completed =
    orders.filter(
    o => o.status === "Delivered"
    ).length;

    let totalSpent =
    orders.reduce(
    (s,o)=>s + Number(o.total || 0),
    0
    );

    let latest =
    orders[orders.length - 1];

    let address =
    latest ? latest.address : "No Address";

    let contact =
    latest ? latest.contact : "No Contact";

    document.getElementById("content").innerHTML = `

    <div class="profile-card">

        <!-- TOP -->

        <div style="
            text-align:center;
            margin-bottom:35px;
        ">

            <div style="
                width:120px;
                height:120px;
                border-radius:50%;
                margin:auto;

                background:
                linear-gradient(
                    135deg,
                    #0ea5e9,
                    #38bdf8
                );

                display:flex;
                align-items:center;
                justify-content:center;

                color:white;
                font-size:42px;
                font-weight:800;

                box-shadow:
                0 15px 35px rgba(14,165,233,0.35);

                margin-bottom:18px;
            ">

                ${username.charAt(0).toUpperCase()}

            </div>

            <h2 style="
                font-size:32px;
                margin-bottom:6px;
            ">
                ${username}
            </h2>

            <p style="
                color:#64748b;
                font-size:15px;
            ">
                💧 Premium Water Customer
            </p>

        </div>

        <!-- STATS -->

        <div style="
            display:grid;
            grid-template-columns:
            repeat(auto-fit,minmax(220px,1fr));
            gap:18px;
            margin-bottom:30px;
        ">

            <div class="card" style="
                margin:0;
                padding:22px;
            ">

                <div style="
                    display:flex;
                    justify-content:space-between;
                    align-items:center;
                ">

                    <div>

                        <p style="
                            color:#64748b;
                            font-size:13px;
                            margin-bottom:8px;
                        ">
                            Total Orders
                        </p>

                        <h1 style="
                            color:#0f172a;
                            font-size:34px;
                        ">
                            ${orders.length}
                        </h1>

                    </div>

                    <div style="
                        width:60px;
                        height:60px;
                        border-radius:18px;

                        background:
                        linear-gradient(
                            135deg,
                            #38bdf8,
                            #0ea5e9
                        );

                        display:flex;
                        align-items:center;
                        justify-content:center;

                        color:white;
                        font-size:24px;
                    ">

                        <i class="fa fa-box"></i>

                    </div>

                </div>

            </div>

            <div class="card" style="
                margin:0;
                padding:22px;
            ">

                <div style="
                    display:flex;
                    justify-content:space-between;
                    align-items:center;
                ">

                    <div>

                        <p style="
                            color:#64748b;
                            font-size:13px;
                            margin-bottom:8px;
                        ">
                            Completed
                        </p>

                        <h1 style="
                            color:#22c55e;
                            font-size:34px;
                        ">
                            ${completed}
                        </h1>

                    </div>

                    <div style="
                        width:60px;
                        height:60px;
                        border-radius:18px;

                        background:
                        linear-gradient(
                            135deg,
                            #22c55e,
                            #16a34a
                        );

                        display:flex;
                        align-items:center;
                        justify-content:center;

                        color:white;
                        font-size:24px;
                    ">

                        <i class="fa fa-check"></i>

                    </div>

                </div>

            </div>

            <div class="card" style="
                margin:0;
                padding:22px;
            ">

                <div style="
                    display:flex;
                    justify-content:space-between;
                    align-items:center;
                ">

                    <div>

                        <p style="

/* NOTIFY */

function notify(text){

    let div =
    document.createElement("div");

    div.className =
    "notify";

    div.innerHTML =
    text;

    document.body.appendChild(div);

    setTimeout(()=>{

        div.remove();

    },3000);
}

/* REALTIME */

setInterval(()=>{

    let orders =
    getOrders();

    orders.forEach(o=>{

        if(o.user===getUser()){

            if(localStorage.getItem(
            "last-"+o.orderNumber
            ) !== o.status){

                localStorage.setItem(
                "last-"+o.orderNumber,
                o.status
                );

                notify(
                `🚚 Order #${o.orderNumber}
                is now ${o.status}`
                );
            }
        }
    });

},2000);

/* CHAT */

function toggleFAQ(){

    let box = document.getElementById("faqBox");

    box.style.display =
    box.style.display === "flex"
    ? "none"
    : "flex";
}

function sendFAQ(){

    let input = document.getElementById("faqInput");
    let msg = input.value.toLowerCase().trim();

    if(!msg) return;

    let answer = getFAQAnswer(msg);

    document.getElementById("faqBody").innerHTML +=
    `<p><b>You:</b> ${msg}</p>
     <p><b>AI:</b> ${answer}</p>`;

    input.value = "";
}

/* SIMPLE FAQ BRAIN */
function getFAQAnswer(msg){

    if(msg.includes("how long") || msg.includes("delivery time")){
        return "⏱️ Delivery time is 3–5 minutes only.";
    }

    if(msg.includes("payment")){
        return "💳 You can pay via Cash or GCash.";
    }

    if(msg.includes("price") || msg.includes("how much")){
        return "💧 Standard rate is ₱150 per order.";
    }

    if(msg.includes("track") || msg.includes("status")){
        return "📦 You can check Tracking page for real-time status.";
    }

    if(msg.includes("hello") || msg.includes("hi")){
        return "👋 Hello! How can I help you today?";
    }

    return "❌ Sorry, hindi ko masasagot yan sa system namin.";
}
