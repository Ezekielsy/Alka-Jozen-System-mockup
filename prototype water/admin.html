<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADMIN</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Segoe UI;
  background:#0f172a;
  color:white;
  display:flex;
}

/* SIDEBAR */

.sidebar{
  width:250px;
  height:100vh;
  background:#111827;
  padding:20px;
  position:fixed;
}

.brand{
  font-size:24px;
  font-weight:bold;
  color:#38bdf8;
  margin-bottom:30px;
}

.sidebar button{
  width:100%;
  padding:14px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  color:white;
  cursor:pointer;
  transition:.3s;
  text-align:left;
  font-size:15px;
}

.sidebar button:hover{
  background:#38bdf8;
  transform:translateX(5px);
}

/* MAIN */

.main{
  margin-left:250px;
  width:100%;
  padding:20px;
}

/* TOPBAR */

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.topbar h1{
  font-size:28px;
}

.clock{
  background:rgba(255,255,255,0.08);
  padding:10px 20px;
  border-radius:12px;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

/* CARD */

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:20px;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

/* STAT */

.stat{
  text-align:center;
  transition:.3s;
}

.stat:hover{
  transform:translateY(-5px);
}

.stat h2{
  font-size:35px;
  color:#38bdf8;
}

/* TABLE */

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  text-align:left;
}

th{
  color:#94a3b8;
}

tr{
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* STATUS */

.status{
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.pending{
  background:#f59e0b;
}

.delivered{
  background:#22c55e;
}

.ontheway{
  background:#3b82f6;
}

/* BUTTON */

.btn{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.green{background:#22c55e;}
.blue{background:#3b82f6;}
.orange{background:#f59e0b;}

/* NOTIFICATIONS */

.notify{
  margin:10px 0;
  padding:12px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
}

/* RESPONSIVE */

@media(max-width:768px){

.sidebar{
  width:100%;
  height:auto;
  position:relative;
}

.main{
  margin-left:0;
}

body{
  flex-direction:column;
}

}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="brand">💧 ADMIN</div>

<button onclick="dashboard()">📊 Dashboard</button>
<button onclick="orders()">📦 Orders</button>
<button onclick="riders()">🚴 Riders</button>
<button onclick="analytics()">📈 Analytics</button>
<button onclick="ai()">🛠 Help Center</button>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>Dashboard</h1>

<div class="clock" id="clock"></div>

</div>

<div id="content"></div>

</div>

<script>

/* CLOCK */

setInterval(()=>{
document.getElementById("clock").innerHTML =
new Date().toLocaleTimeString();
},1000);

/* DATA */

let order = {
  orderNumber:"001",
  user:"Juan Dela Cruz",
  address:"Urduja, Caloocan City",
  total:30,
  status:"Pending",
  rider:"Auto Rider System",

  payment:"GCash",
  reference:"1234567890",
  paymentStatus:"Unpaid"
};

/* DASHBOARD */

dashboard();

function dashboard(){

document.getElementById("content").innerHTML = `

<!-- STATS -->

<div class="grid">

<div class="card stat">
<h2>1</h2>
<p>Total Orders</p>
</div>

<div class="card stat">
<h2>₱30</h2>
<p>Total Sales</p>
</div>

<div class="card stat">
<h2>2</h2>
<p>Active Riders</p>
</div>

<div class="card stat">
<h2>${order.status=="Delivered" ? 1 : 0}</h2>
<p>Delivered</p>
</div>

</div>

<br>

<!-- CHART -->

<div class="card">

<h3>📈 Weekly Sales</h3>

<br>

<canvas id="salesChart"></canvas>

</div>

<br>

<!-- RECENT ORDERS -->

<div class="card">

<h3>📦 Recent Orders</h3>

<br>

<table>

<tr>
<th>Order</th>
<th>Customer</th>
<th>Status</th>
<th>Total</th>
</tr>

<tr>
<td>#${order.orderNumber}</td>
<td>${order.user}</td>
<td>

<span class="status ${
order.status=="Pending"
? "pending"
: order.status=="Delivered"
? "delivered"
: "ontheway"
}">

${order.status}

</span>

</td>

<td>₱${order.total}</td>
</tr>

</table>

</div>

<br>

<!-- NOTIFICATIONS -->

<div class="card">

<h3>🔔 Notifications</h3>

<div class="notify">
📦 New order received
</div>

<div class="notify">
🚴 Rider assigned automatically
</div>

<div class="notify">
💰 Revenue updated
</div>

</div>

<br>


`;

setTimeout(loadChart,100);

}

/* CHART */

function loadChart(){

new Chart(document.getElementById("salesChart"),{

type:'line',

data:{
labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],

datasets:[{
label:'Sales',
data:[120,190,300,250,400,280,500],
borderColor:'#38bdf8',
backgroundColor:'rgba(56,189,248,0.2)',
fill:true,
tension:.4
}]
},

options:{
responsive:true,
plugins:{
legend:{
labels:{
color:'white'
}
}
},
scales:{
x:{
ticks:{color:'white'}
},
y:{
ticks:{color:'white'}
}
}
}

});

}

/* ORDERS */

function orders(){

let html = `
<div class="card">
<h2>📦 Order Management</h2>
<p class="sub">Click an order to view details & payment verification</p>
</div>
`;

html += `
<div class="card">
`;

// sample list (later pwede mo palitan ng localStorage orders)
html += `
<div onclick="viewOrder('001')" style="padding:15px; background:rgba(255,255,255,0.05); margin-bottom:10px; border-radius:12px; cursor:pointer;">
<b>#001</b> - Juan Dela Cruz
<br>
<span class="status pending">Pending Payment</span>
</div>

<div onclick="viewOrder('002')" style="padding:15px; background:rgba(255,255,255,0.05); margin-bottom:10px; border-radius:12px; cursor:pointer;">
<b>#002</b> - Maria Santos
<br>
<span class="status ontheway">Paid (GCash)</span>
</div>
`;

html += `</div>`;

document.getElementById("content").innerHTML = html;
}

function viewOrder(id){

let html = `
<div class="card">

<h2>📦 Order #${id}</h2>

<hr><br>

👤 Customer: Juan Dela Cruz<br>
📍 Address: Urduja, Caloocan City<br>
💰 Total: ₱30<br>
🚚 Status: Pending<br><br>

<h3>💳 Payment Verification</h3>

<div style="margin-top:10px; padding:15px; background:rgba(255,255,255,0.05); border-radius:12px;">

📌 Method: GCash<br>
📌 Reference: 09123456789<br>
📌 Proof: <br><br>

<img src="https://via.placeholder.com/250x150?text=GCash+Proof" style="border-radius:12px; width:100%;">

<br><br>

<button class="btn green" onclick="approvePayment()">
✔ Approve Payment
</button>

<button class="btn orange" onclick="rejectPayment()">
✖ Reject
</button>

</div>

</div>
`;

document.getElementById("content").innerHTML = html;
}

function approvePayment(){
alert("Payment Approved ✔");
orders();
}

function rejectPayment(){
alert("Payment Rejected ✖");
orders();
}
/* UPDATE STATUS */

function updateStatus(status){

order.status = status;

alert("Order updated to: " + status);

orders();

}

/* RIDERS */

function riders(){

document.getElementById("content").innerHTML = `

<div class="card">

<h2>🚴 Rider Panel</h2>

<br>

<p>🚴 Rider Name: ${order.rider}</p>

<br>

<p>📦 Current Deliveries: 1</p>

<br>

<p>🚚 Status: ${order.status}</p>

</div>

`;

}

/* ANALYTICS */

function analytics(){

document.getElementById("content").innerHTML = `

<div class="grid">

<div class="card stat">
<h2>₱30</h2>
<p>Today's Revenue</p>
</div>

<div class="card stat">
<h2>1</h2>
<p>Total Orders</p>
</div>

<div class="card stat">
<h2>95%</h2>
<p>Success Rate</p>
</div>

</div>

<br>

<div class="card">

<h3>📈 Business Analytics</h3>

<br>

<p>✔ Orders are stable today.</p>

<p>✔ Delivery performance is good.</p>

<p>✔ Revenue increased from yesterday.</p>

</div>

`;

}

<div class="card">

<div class="notify">

📦 <b>Order Management</b>

<br><br>

• Accept customer orders<br>

`;

</script>

</body>
</html>
