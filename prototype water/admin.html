<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OWNER DASHBOARD</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI;
background:
linear-gradient(
135deg,
#0f4c75 0%,
#3282b8 25%,
#bbe1fa 50%,
#3282b8 75%,
#0f4c75 100%
);
background-size:400% 400%;
animation:waterFlow 20s ease infinite;
color:white;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

@keyframes waterFlow{
0%{background-position:0% 50%;}
25%{background-position:100% 50%;}
50%{background-position:100% 0%;}
75%{background-position:0% 0%;}
100%{background-position:0% 50%;}
}

/* BUBBLES */

.bubble{
position:fixed;
border-radius:50%;
background:linear-gradient(
135deg,
rgba(187,225,250,0.3),
rgba(50,130,184,0.2)
);
backdrop-filter:blur(15px);
border:2px solid rgba(187,225,250,0.4);
animation:waterDrop 15s infinite ease-in-out;
z-index:0;
}

@keyframes waterDrop{
0%{
transform:translateY(0) scale(1);
opacity:.7;
}
50%{
transform:translateY(-40px) scale(1.1);
opacity:1;
}
100%{
transform:translateY(0) scale(1);
opacity:.7;
}
}

/* SIDEBAR */

.sidebar{
width:260px;
height:100vh;
position:fixed;
padding:20px;
background:rgba(15,76,117,0.9);
backdrop-filter:blur(25px);
border-right:1px solid rgba(255,255,255,0.2);
z-index:10;
}

.brand{
font-size:24px;
font-weight:bold;
color:#bbe1fa;
text-align:center;
margin-bottom:30px;
}

.sidebar button{
width:100%;
padding:16px;
margin:10px 0;
border:none;
border-radius:16px;
background:rgba(255,255,255,0.08);
color:white;
cursor:pointer;
font-size:15px;
transition:.3s;
text-align:left;
}

.sidebar button:hover{
background:rgba(255,255,255,0.18);
transform:translateX(5px);
}

/* MAIN */

.main{
margin-left:260px;
padding:30px;
width:100%;
position:relative;
z-index:1;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.topbar h1{
font-size:32px;
color:#bbe1fa;
}

.clock{
padding:14px 20px;
border-radius:16px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:22px;
padding:25px;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 8px 30px rgba(0,0,0,0.2);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* STAT */

.stat{
text-align:center;
}

.stat h2{
font-size:40px;
color:#bbe1fa;
}

.stat p{
margin-top:10px;
color:#dbeafe;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
overflow:hidden;
border-radius:16px;
}

th,td{
padding:16px;
text-align:left;
}

th{
background:rgba(15,76,117,0.5);
color:#bbe1fa;
}

tr{
background:rgba(255,255,255,0.05);
}

tr:hover{
background:rgba(255,255,255,0.1);
}

/* STATUS */

.status{
padding:8px 14px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.pending{
background:#f59e0b;
}

.delivered{
background:#22c55e;
}

.ontime{
background:#3b82f6;
}

/* NOTIFY */

.notify{
padding:18px;
margin:12px 0;
border-radius:14px;
background:rgba(255,255,255,0.08);
}

/* BUTTON */

.btn{
padding:12px 20px;
border:none;
border-radius:14px;
background:#3b82f6;
color:white;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* RESPONSIVE */

@media(max-width:768px){

body{
flex-direction:column;
}

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
}

}

/* CALENDAR */

.calendar{
width:100%;
}

.calendar-header{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
margin-bottom:10px;
}

.calendar-header div{
background:rgba(255,255,255,0.08);
padding:12px;
text-align:center;
border-radius:12px;
font-weight:bold;
color:#bbe1fa;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day{
height:90px;
border-radius:16px;
padding:10px;
display:flex;
flex-direction:column;
justify-content:space-between;
font-weight:bold;
transition:.3s;
color:white;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.day:hover{
transform:translateY(-3px);
background:rgba(255,255,255,0.1);
}

.day span{
font-weight:bold;
font-size:18px;
}

.day small{
font-size:11px;
margin-top:8px;
}

.attended{
border:2px solid #22c55e;
}

.late{
border:2px solid #f59e0b;
}

.empty{
background:transparent;
border:none;
}

/* ================= CALENDAR ================= */

.calendar-controls{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.calendar-controls h2{
font-size:32px;
font-weight:bold;
color:white;
}

.calendar-btn{
width:55px;
height:55px;
border:none;
border-radius:18px;
background:#3b82f6;
color:white;
font-size:22px;
cursor:pointer;
transition:.3s;
}

.calendar-btn:hover{
transform:scale(1.08);
background:#2563eb;
}

/* DAYS HEADER */

.calendar-header{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
margin-bottom:15px;
}

.calendar-header div{
text-align:center;
font-weight:bold;
padding:10px;
font-size:20px;
color:white;
}

/* GRID */

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

/* DAY BOX */

.day{
height:120px;
border-radius:20px;
padding:15px;
display:flex;
flex-direction:column;
justify-content:space-between;
font-weight:bold;
transition:.3s;
color:white;

.day:hover{

/* COLORS */

.presentDay{

.lateDay{

}

.absentDay{

}

.empty{

/* TEXT */

}

.time{

}

.status-label{
font-size:10px;

}

/* RESPONSIVE */

@media(max-width:768px){

.calendar-grid{
grid-template-columns:repeat(2,1fr);

.calendar-header{

.rider-card:hover{

</style>

/* ================= REAL CALENDAR ================= */

let currentMonth = 4;
let currentYear = 2026;

const months = [
"January","February","March","April",
"May","June","July","August",
"September","October","November","December"
];

/* SAMPLE ATTENDANCE */

const attendance = {

1:{
status:"Present",
in:"8:00 AM",

23:{
status:"Absent"

status:"Absent"
},

30:{
status:"Absent"
},

31:{
status:"Absent"
}

};

function generateCalendar(){

const grid =
document.getElementById("calendarGrid");

if(!grid) return;

grid.innerHTML = "";

document.getElementById("monthTitle").innerHTML =
`📅 ${months[currentMonth]} ${currentYear}`;

const firstDay =
new Date(currentYear,currentMonth,1).getDay();

const totalDays =
new Date(currentYear,currentMonth + 1,0).getDate();

/* EMPTY CELLS */

for(let i=0;i<firstDay;i++){

grid.innerHTML += `
<div class="day empty"></div>
`;

}

/* DAYS */

for(let day=1; day<=totalDays; day++){

let data = attendance[day];

let className = "presentDay";
let content = "";

if(data){

if(data.status === "Late"){

className = "lateDay";

}

else if(data.status === "Absent"){

className = "absentDay";

}

content = `

<div class="day-number">
${day}
</div>

<div class="time">

${data.in ? `🕘 ${data.in}<br>` : ""}

${data.out ? `🕔 ${data.out}` : "No Attendance"}

</div>

<div class="status-label">
${data.status}
</div>

`;

}

else{

content = `

<div class="day-number">
${day}
</div>

<div class="time">
🕘 8:00 AM<br>
🕔 5:00 PM
</div>

<div class="status-label">
Present
</div>

`;

}

grid.innerHTML += `
<div class="day ${className}">
${content}
</div>
`;

}

}

/* BUTTONS */

function prevMonth(){

currentMonth--;

if(currentMonth < 0){

currentMonth = 11;
currentYear--;

}

generateCalendar();

}

function nextMonth(){

currentMonth++;

if(currentMonth > 11){

currentMonth = 0;
currentYear++;

}

generateCalendar();

}

},

15:{
status:"Present",
in:"8:00 AM",
out:"5:00 PM"
},

20:{
status:"Late",
in:"8:50 AM",
out:"5:15 PM"
},

25:{
status:"Absent"
}

};

function generateRiderCalendar(){

const grid =
document.getElementById(
"riderCalendarGrid"
);

if(!grid) return;

grid.innerHTML = "";

/* MONTH TITLE */

document.getElementById(
"riderMonthTitle"
).innerHTML =

`📅 ${
riderMonths[riderCurrentMonth]
} ${riderCurrentYear}`;

/* FIRST DAY */

const firstDay =
new Date(
riderCurrentYear,
riderCurrentMonth,
1
).getDay();

/* TOTAL DAYS */

const totalDays =
new Date(
riderCurrentYear,
riderCurrentMonth + 1,
0
).getDate();

/* EMPTY BOXES */

for(let i=0;i<firstDay;i++){

grid.innerHTML += `
<div class="day empty"></div>
`;

}

/* DAYS */

for(let day=1; day<=totalDays; day++){

let data =
riderAttendance[day];

let className =
"presentDay";

let content = "";

/* WITH RECORD */

if(data){

if(data.status === "Late"){

className = "lateDay";

}

else if(
data.status === "Absent"
){

className = "absentDay";

}

content = `

<div class="day-number">
${day}
</div>

<div class="time">

${data.in ?
`🕘 ${data.in}<br>` : ""}

${data.out ?
`🕔 ${data.out}` :
"No Attendance"}

</div>

<div class="status-label">
${data.status}
</div>

`;

}

/* DEFAULT PRESENT */

else{

content = `

<div class="day-number">
${day}
</div>

<div class="time">
🕘 8:00 AM<br>
🕔 5:00 PM
</div>

<div class="status-label">
Present
</div>

`;

}

/* APPEND */

grid.innerHTML += `

<div class="day ${className}">
${content}
</div>

`;

}

}

/* PREVIOUS MONTH */

function prevRiderMonth(){

riderCurrentMonth--;

if(riderCurrentMonth < 0){

riderCurrentMonth = 11;
riderCurrentYear--;

}

generateRiderCalendar();

}

/* NEXT MONTH */

function nextRiderMonth(){

riderCurrentMonth++;

if(riderCurrentMonth > 11){

riderCurrentMonth = 0;
riderCurrentYear++;

}

generateRiderCalendar();

}
