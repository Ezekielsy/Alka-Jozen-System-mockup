<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OWNER DASHBOARD</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI;
background:
linear-gradient(
135deg,
#0f4c75 0%,
#3282b8 25%,
#bbe1fa 50%,
#3282b8 75%,
#0f4c75 100%
);
background-size:400% 400%;
animation:waterFlow 20s ease infinite;
color:white;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

@keyframes waterFlow{
0%{background-position:0% 50%;}
25%{background-position:100% 50%;}
50%{background-position:100% 0%;}
75%{background-position:0% 0%;}
100%{background-position:0% 50%;}
}

/* BUBBLES */

.bubble{
position:fixed;
border-radius:50%;
background:linear-gradient(
135deg,
rgba(187,225,250,0.3),
rgba(50,130,184,0.2)
);
backdrop-filter:blur(15px);
border:2px solid rgba(187,225,250,0.4);
animation:waterDrop 15s infinite ease-in-out;
z-index:0;
}

@keyframes waterDrop{
0%{
transform:translateY(0) scale(1);
opacity:.7;
}
50%{
transform:translateY(-40px) scale(1.1);
opacity:1;
}
100%{
transform:translateY(0) scale(1);
opacity:.7;
}
}

/* SIDEBAR */

.sidebar{
width:260px;
height:100vh;
position:fixed;
padding:20px;
background:rgba(15,76,117,0.9);
backdrop-filter:blur(25px);
border-right:1px solid rgba(255,255,255,0.2);
z-index:10;
}

.brand{
font-size:24px;
font-weight:bold;
color:#bbe1fa;
text-align:center;
margin-bottom:30px;
}

.sidebar button{
width:100%;
padding:16px;
margin:10px 0;
border:none;
border-radius:16px;
background:rgba(255,255,255,0.08);
color:white;
cursor:pointer;
font-size:15px;
transition:.3s;
text-align:left;
}

.sidebar button:hover{
background:rgba(255,255,255,0.18);
transform:translateX(5px);
}

/* MAIN */

.main{
margin-left:260px;
padding:30px;
width:100%;
position:relative;
z-index:1;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.topbar h1{
font-size:32px;
color:#bbe1fa;
}

.clock{
padding:14px 20px;
border-radius:16px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:22px;
padding:25px;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 8px 30px rgba(0,0,0,0.2);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* STAT */

.stat{
text-align:center;
}

.stat h2{
font-size:40px;
color:#bbe1fa;
}

.stat p{
margin-top:10px;
color:#dbeafe;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
overflow:hidden;
border-radius:16px;
}

th,td{
padding:16px;
text-align:left;
}

th{
background:rgba(15,76,117,0.5);
color:#bbe1fa;
}

tr{
background:rgba(255,255,255,0.05);
}

tr:hover{
background:rgba(255,255,255,0.1);
}

/* STATUS */

.status{
padding:8px 14px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.pending{
background:#f59e0b;
}

.delivered{
background:#22c55e;
}

.ontime{
background:#3b82f6;
}

/* NOTIFY */

.notify{
padding:18px;
margin:12px 0;
border-radius:14px;
background:rgba(255,255,255,0.08);
}

/* BUTTON */

.btn{
padding:12px 20px;
border:none;
border-radius:14px;
background:#3b82f6;
color:white;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* RESPONSIVE */

@media(max-width:768px){

body{
flex-direction:column;
}

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
}

}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="brand">
💧 OWNER DASHBOARD
</div>

<button onclick="salesReport()">💰 Sales Report</button>

<button onclick="managerPerformance()">👨‍💼 Manager Performance</button>

<button onclick="riderPerformance()">🚴 Rider Performance</button>

<button onclick="inventoryFilter()">🧪 Inventory & Filter</button>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>Owner Monitoring System</h1>

<div class="clock" id="clock"></div>

</div>

<div id="content"></div>

</div>

<script>

/* CLOCK */

setInterval(()=>{

document.getElementById("clock").innerHTML =
new Date().toLocaleTimeString();

},1000);

/* SAMPLE DATA */

let gallonsInput = parseFloat(localStorage.getItem("gallons")) || 500;
let filterLife = parseFloat(localStorage.getItem("filterLife")) || 78;
let inventoryLogs = JSON.parse(localStorage.getItem("inventoryLogs")) || [];
/* ADD GALLONS */

function addGallons(count){

gallonsInput += count;

/* 0.005 deduction */
filterLife -= (count * 0.005);

if(filterLife < 0){
filterLife = 0;
}

inventoryFilter();

}

/* ================= SALES REPORT ================= */

function salesReport(){

document.getElementById("content").innerHTML = `

<div class="grid">

<div class="card stat">
<h2>120</h2>
<p>Daily Delivered Gallons</p>
</div>

<div class="card stat">
<h2>₱7,200</h2>
<p>Daily Income</p>
</div>

<div class="card stat">
<h2>850</h2>
<p>Weekly Delivered</p>
</div>

<div class="card stat">
<h2>₱210,000</h2>
<p>Monthly Sales</p>
</div>

</div>

<br>

<div class="card">

<h3>📈 Sales Overview</h3>

<br>

<canvas id="salesChart"></canvas>

</div>

<br>

<div class="card">

<h3>💰 Total Sales Summary</h3>

<br>

<table>

<tr>
<th>Period</th>
<th>Gallons Sold</th>
<th>Income</th>
</tr>

<tr>
<td>Today</td>
<td>120</td>
<td>₱7,200</td>
</tr>

<tr>
<td>This Week</td>
<td>850</td>
<td>₱52,000</td>
</tr>

<tr>
<td>This Month</td>
<td>3,200</td>
<td>₱210,000</td>
</tr>

</table>

</div>

`;

setTimeout(loadChart,100);

}

/* CHART */

function loadChart(){

new Chart(document.getElementById("salesChart"),{

type:'line',

data:{
labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
datasets:[{
label:'Sales',
data:[5000,7000,9000,6000,12000,10000,15000],
borderColor:'#38bdf8',
backgroundColor:'rgba(56,189,248,0.2)',
fill:true,
tension:.4
}]
},

options:{
responsive:true,
plugins:{
legend:{
labels:{
color:'white'
}
}
},
scales:{
x:{
ticks:{color:'white'}
},
y:{
ticks:{color:'white'}
}
}
}

});

}

/* ================= MANAGER PERFORMANCE ================= */

function managerPerformance(){

/* GET DATA FROM MANAGER PAGE */

let loginTime =
localStorage.getItem("managerLoginTime");

let loginDate =
localStorage.getItem("managerLoginDate");

let attendanceStatus =
localStorage.getItem("managerAttendanceStatus");

let logoutTime =
localStorage.getItem("managerLogoutTime");

/* DEFAULT VALUES */

if(!loginTime){

loginTime = "-";
loginDate = "-";
attendanceStatus = "No Record";
logoutTime = "-";

}

/* SAMPLE REPORT DATA */

let refilled = 150;
let sold = 120;
let unsold = 30;

document.getElementById("content").innerHTML = `

<div class="grid">

<div class="card stat">
<h2>${attendanceStatus}</h2>
<p>Attendance Status</p>
</div>

<div class="card stat">
<h2>${refilled}</h2>
<p>Refilled Gallons</p>
</div>

<div class="card stat">
<h2>${sold}</h2>
<p>Gallons Sold</p>
</div>

<div class="card stat">
<h2>${unsold}</h2>
<p>Unsold Gallons</p>
</div>

</div>

<br>

<div class="card">

<h3>👨‍💼 Attendance Tracking</h3>

<br>

<table>

<tr>
<th>Date</th>
<th>Log In</th>
<th>Status</th>
<th>Log Out</th>
</tr>

<tr>

<td>${loginDate}</td>

<td>${loginTime}</td>

<td>

<span class="status ${
attendanceStatus == "Late"
? "pending"
: "delivered"
}">

${attendanceStatus}

</span>

</td>

<td>${logoutTime}</td>

</tr>

</table>

</div>

<br>

<div class="card">

<h3>📋 Submitted Report</h3>

<br>

<div class="notify">
🧾 Refilled Gallons:
${refilled}
</div>

<div class="notify">
💧 Sold Gallons:
${sold}
</div>

<div class="notify">
⚠ Unsold Gallons:
${unsold}
</div>

<div class="notify">
📌 Reason:
Reserve gallons prepared for next day delivery.
</div>

</div>

`;

}

/* ================= RIDER PERFORMANCE ================= */

function riderPerformance(){

let riderLate = true;

document.getElementById("content").innerHTML = `

<div class="grid">

<div class="card stat">
<h2>5</h2>
<p>Total Riders</p>
</div>

<div class="card stat">
<h2>4</h2>
<p>Active Riders</p>
</div>

<div class="card stat">
<h2>${riderLate ? "1" : "0"}</h2>
<p>Late Riders</p>
</div>

</div>

<br>

<div class="card">

<h3>🚴 Rider Attendance</h3>

<br>

<table>

<tr>
<th>Rider</th>
<th>Date</th>
<th>Log In</th>
<th>Status</th>
</tr>

<tr>

<td>Juan Rider</td>
<td>May 19, 2026</td>
<td>10:20 PM</td>

<td>

<span class="status pending">
Late
</span>

</td>

</tr>

<tr>

<td>Mark Rider</td>
<td>May 19, 2026</td>
<td>9:55 PM</td>

<td>

<span class="status delivered">
On Time
</span>

</td>

</tr>

</table>

</div>

`;

}

/* ================= INVENTORY & FILTER ================= */

function inventoryFilter(){

let latestUpdate = "15 mins ago";

let warning = filterLife <= 10;

document.getElementById("content").innerHTML = `

<div class="grid">

<div class="card stat">
<h2>${gallonsInput}</h2>
<p>Total Gallons Input</p>
</div>

<div class="card stat">
<h2>${filterLife.toFixed(2)}%</h2>
<p>Filter Lifespan</p>
</div>

<div class="card stat">
<h2>${latestUpdate}</h2>
<p>Latest Update</p>
</div>

</div>

<br>

<div class="card">

<h3>🧪 Real-Time Inventory</h3>

<br>

<table>

<tr>
<th>Date</th>
<th>Gallons Added</th>
<th>Updated By</th>
<th>Time</th>
</tr>

<tr>
<td>May 19, 2026</td>
<td>25 Gallons</td>
<td>Manager</td>
<td>10:45 PM</td>
</tr>

<tr>
<td>May 19, 2026</td>
<td>30 Gallons</td>
<td>Manager</td>
<td>11:20 PM</td>
</tr>

</table>

<br>


</div>

<br>

<div class="card">

<h3>⚙ Filter Status</h3>

<br>

<div class="notify">
💧 Every gallon input reduces filter lifespan by 0.005%
</div>

<div class="notify">
🧪 Current Filter Life: ${filterLife.toFixed(2)}%
</div>

${warning ? `

<div class="notify" style="background:rgba(255,0,0,0.2); border:1px solid red;">
⚠ WARNING:
Filter is below 10%.

Replace within 14 days.
</div>

` : `

<div class="notify">
✅ Filter condition is stable.
</div>

`}

</div>

`;

}

/* DEFAULT PAGE */

salesReport();

/* BUBBLES */

function createBubble(){

const bubble = document.createElement('div');

bubble.className = 'bubble';

const size = Math.random() * 40 + 20;

bubble.style.width = size + 'px';
bubble.style.height = size + 'px';

bubble.style.left = Math.random() * 100 + 'vw';
bubble.style.top = Math.random() * 100 + 'vh';

document.body.appendChild(bubble);

setTimeout(()=>{
bubble.remove();
},15000);

}

setInterval(createBubble,2000);

for(let i=0;i<8;i++){

setTimeout(createBubble,Math.random()*5000);

}

</script>

</body>
</html>
